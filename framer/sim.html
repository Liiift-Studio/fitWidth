<!doctype html>
<!-- fitWidth/framer/sim.html — Framer-less simulator for the FitWidth code component.
     Renders the REAL src/framer/FitWidth.tsx (transpiled to FitWidth.sim.mjs) in a plain
     browser, with the "framer" import mapped to a local shim and React from esm.sh. This proves
     the component's runtime logic (rendering, applyFitWidth, ResizeObserver re-fit) outside Framer.
     Build step: npx esbuild src/framer/FitWidth.tsx --loader:.tsx=tsx --format=esm
       --jsx=automatic --jsx-import-source=react --outfile=framer/FitWidth.sim.mjs -->
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>FitWidth — Framer component simulator</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,wdth@8..144,100..1000,25..151&display=swap" rel="stylesheet" />
	<style>
		body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0e0e12; color: #f4f4f6; padding: 4rem 6vw; }
		#root { width: 100%; max-width: 32ch; outline: 1px dashed rgba(255,255,255,0.15); }
		.note { position: fixed; bottom: 1rem; left: 0; right: 0; text-align: center; font: 0.8rem system-ui; opacity: 0.5; }
	</style>
	<script type="importmap">
	{
		"imports": {
			"react": "https://esm.sh/react@18",
			"react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
			"react-dom/client": "https://esm.sh/react-dom@18/client",
			"framer": "./framer-shim.js"
		}
	}
	</script>
</head>
<body>
	<div id="root"></div>
	<p class="note">Simulating the Framer code component in a plain browser — the fit runs once against the dashed container.</p>
	<script type="module">
		import React from "react"
		import { createRoot } from "react-dom/client"
		import FitWidth from "./FitWidth.sim.mjs"
		createRoot(document.getElementById("root")).render(
			React.createElement(FitWidth, {
				text: "Fit to width",
				fontFamily: "Roboto Flex",
				fontSize: 72,
				color: "#f4f4f6",
				textAlign: "left",
				targetMode: "container",
				prefer: "auto",
				axis: "wdth",
				axisMin: 25,
				axisMax: 151,
				maxTracking: 0.3,
				tolerance: 0.5,
				respectReducedMotion: false,
			})
		)
	</script>
</body>
</html>
