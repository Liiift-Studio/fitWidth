<!doctype html>
<!-- fitWidth/webflow/harness.html — local proof of the Webflow embed bundle.
     Serve the fitWidth repo root (e.g. `python3 -m http.server`) and open
     /webflow/harness.html after `npm run build:webflow`. The headline should
     stretch its wdth axis to exactly touch the bordered container's inner edges,
     and re-fit when the window is resized. -->
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>fitWidth — Webflow embed harness</title>

	<!-- Roboto Flex: a variable font with a real wdth axis (25–151). Local-test only. -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,wdth@8..144,100..1000,25..151&display=swap" rel="stylesheet" />

	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			justify-content: center;
			gap: 2rem;
			background: #0e0e12;
			color: #f4f4f6;
			font-family: 'Roboto Flex', system-ui, sans-serif;
			padding: 4rem 6vw;
			box-sizing: border-box;
		}
		/* The container the headline must fill exactly. Dashed edges make the fit visible. */
		.frame {
			border-left: 2px dashed #e0559b;
			border-right: 2px dashed #e0559b;
			padding: 0;
		}
		h1 {
			font-size: clamp(3rem, 8vw, 7rem);
			line-height: 1.1;
			margin: 0;
			white-space: nowrap;
			font-weight: 500;
		}
		p.note { font-size: 0.9rem; opacity: 0.5; max-width: 46ch; line-height: 1.5; }
	</style>
</head>
<body>
	<div class="frame">
		<!-- The whole integration: mark it data-fitwidth and set the axis bounds. -->
		<h1
			data-fitwidth
			data-fw-target="container"
			data-fw-prefer="auto"
			data-fw-axis="wdth"
			data-fw-axis-min="25"
			data-fw-axis-max="151"
		>FILL THE FRAME</h1>
	</div>

	<p class="note">
		If the headline stretches its letterforms to touch both dashed edges — and
		re-flows when you resize the window — the fitWidth Webflow embed works, with
		<code>@liiift-studio/measure-core</code> doing the off-screen measurement.
	</p>

	<!-- The entire distribution surface: one script tag. Built by `npm run build:webflow`. -->
	<script src="../dist/fitwidth.webflow.min.js"></script>
</body>
</html>
